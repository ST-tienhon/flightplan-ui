server {
  listen 80;
  server_name _;

  # Vite build output will be copied here by Dockerfile
  root /usr/share/nginx/html;
  index index.html;

  # --- Health check (use this for ALB target group health check path) ---
  location = /health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # --- Security-ish headers (safe defaults for static SPA) ---
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # If you later use HTTPS at ALB, enable HSTS there (recommended),
  # not here, unless you are sure everything is HTTPS end-to-end.

  # --- Main SPA route handling ---
  location / {
    # Serve file if exists, otherwise fall back to SPA entry
    try_files $uri $uri/ /index.html;
  }

  # --- Vite fingerprinted assets (long cache) ---
  # Vite typically outputs /assets/* with content-hashed filenames.
  location ^~ /assets/ {
    access_log off;
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # --- Common static file caching (moderate) ---
  location ~* \.(?:css|js|mjs|map|json|png|jpg|jpeg|gif|svg|ico|webp|avif|woff2?|ttf|otf)$ {
    access_log off;
    expires 7d;
    add_header Cache-Control "public";
    try_files $uri =404;
  }

  # --- Ensure index.html is always fresh (so new deployments take effect) ---
  location = /index.html {
    expires -1;
    add_header Cache-Control "no-cache";
  }

  # --- Optional: API reverse proxy (uncomment if you want nginx to proxy /api) ---
  # location /api/ {
  #   proxy_pass http://backend:3000/;   # or http://<your-service>:<port>/
  #   proxy_http_version 1.1;
  #   proxy_set_header Host $host;
  #   proxy_set_header X-Real-IP $remote_addr;
  #   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  #   proxy_set_header X-Forwarded-Proto $scheme;
  # }

  # --- Optional: custom 404 (usually you want SPA fallback instead) ---
  # error_page 404 /index.html;
}